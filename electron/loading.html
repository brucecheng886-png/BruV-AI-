<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
  <title>BruV AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, "Microsoft JhengHei", "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 28px;
      user-select: none;
      -webkit-user-select: none;
    }

    .logo-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .logo-title {
      font-size: 34px;
      font-weight: 700;
      color: #60a5fa;
      letter-spacing: 3px;
    }

    .logo-sub {
      font-size: 12px;
      color: #475569;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #3b82f6, transparent);
      border-radius: 1px;
    }

    .status-text {
      font-size: 13px;
      color: #94a3b8;
      min-height: 18px;
      text-align: center;
      transition: opacity 0.2s ease;
    }

    .progress-track {
      width: 260px;
      height: 3px;
      background: #1e293b;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #1d4ed8, #60a5fa, #1d4ed8);
      background-size: 200% 100%;
      border-radius: 2px;
      animation: slide 1.8s ease-in-out infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <div class="logo-block">
    <div class="logo-title">BruV AI</div>
    <div class="logo-sub">Knowledge Base Assistant</div>
  </div>

  <div class="divider"></div>

  <div class="status-text" id="status-text">正在初始化...</div>

  <div class="progress-track">
    <div class="progress-bar"></div>
  </div>

  <script>
    if (window.loadingBridge) {
      window.loadingBridge.onStatus(function (text) {
        var el = document.getElementById('status-text')
        if (el) el.textContent = text
      })
    }
  </script>
</body>
</html>
