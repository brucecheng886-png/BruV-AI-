<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
  <title>BruV AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, "Microsoft JhengHei", "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 28px;
      user-select: none;
      -webkit-user-select: none;
    }

    .logo-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .logo-title {
      font-size: 34px;
      font-weight: 700;
      color: #60a5fa;
      letter-spacing: 3px;
    }

    .logo-sub {
      font-size: 12px;
      color: #475569;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #3b82f6, transparent);
      border-radius: 1px;
    }

    .status-text {
      font-size: 13px;
      color: #94a3b8;
      min-height: 18px;
      text-align: center;
      transition: opacity 0.2s ease;
    }

    .progress-track {
      width: 260px;
      height: 3px;
      background: #1e293b;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #1d4ed8, #60a5fa, #1d4ed8);
      background-size: 200% 100%;
      border-radius: 2px;
      animation: slide 1.8s ease-in-out infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(350%); }
    }

    /* ── 規控按鈕 ────────────────────────── */
    .splash-titlebar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 32px;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 10px;
      z-index: 100;
    }
    .splash-wc-btns {
      display: flex;
      align-items: center;
      gap: 6px;
      -webkit-app-region: no-drag;
    }
    .splash-wc-btn {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
      outline: none;
      flex-shrink: 0;
    }
    .splash-wc-btn:hover {
      background: rgba(255,255,255,0.22);
      color: #fff;
    }
    .splash-wc-btn--close:hover {
      background: rgba(239,68,68,0.60);
      color: #fff;
    }
  </style>
</head>
<body>
  <!-- 規控按鈕：縮小化 + 關閉（啟動画面不需要全螢幕） -->
  <div class="splash-titlebar">
    <div class="splash-wc-btns">
      <button class="splash-wc-btn" onclick="window.loadingBridge?.minimize()" title="最小化">
        <svg width="10" height="2" viewBox="0 0 10 2"><rect width="10" height="2" rx="1" fill="currentColor"/></svg>
      </button>
      <button class="splash-wc-btn splash-wc-btn--close" onclick="window.loadingBridge?.close()" title="關閉">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1.5 1.5 L8.5 8.5 M8.5 1.5 L1.5 8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
  <div class="logo-block">
    <div class="logo-title">BruV AI</div>
    <div class="logo-sub">Knowledge Base Assistant</div>
  </div>

  <div class="divider"></div>

  <div class="status-text" id="status-text">正在初始化...</div>

  <div class="progress-track">
    <div class="progress-bar"></div>
  </div>

  <script>
    if (window.loadingBridge) {
      window.loadingBridge.onStatus(function (text) {
        var el = document.getElementById('status-text')
        if (el) el.textContent = text
      })
    }
  </script>
</body>
</html>
