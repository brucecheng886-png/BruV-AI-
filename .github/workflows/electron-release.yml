name: Electron Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-frontend:
    name: Build Frontend (Linux Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend with Node Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/frontend:/app" \
            -w /app \
            node:20-alpine \
            sh -c "npm install --legacy-peer-deps --silent && npm run build"

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  build-electron:
    name: Build & Publish Electron (Windows)
    runs-on: windows-latest
    needs: build-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build and publish
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win -- --publish=always
