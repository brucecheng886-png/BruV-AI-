events {
    worker_connections 1024;
}

http {
    # Docker 內建 DNS resolver；valid=10s 覆蓋 TTL
    # 使用變數型 proxy_pass 時，nginx 每次請求都會按此 TTL 重新解析容器 IP
    # 容器重啟後最多 10 秒自動恢復，無需手動 restart nginx
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 速率限制（防止暴力攻擊）
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 100M;

        # 變數型 proxy_pass：強制 nginx 在每次請求時按 TTL 重新查詢 DNS
        # 注意：proxy_pass 必須寫成 http://$var:port（無路徑），才不會截掉 location 前綴
        set $backend_host backend;

        # API 路由
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$backend_host:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 上傳路由（更嚴格的速率限制）
        location /api/documents/upload {
            limit_req zone=upload burst=3 nodelay;
            proxy_pass http://$backend_host:8000;
            proxy_set_header Host $host;
            proxy_read_timeout 300s;
        }

        # SSE 串流（關閉 buffering）
        location /api/chat/stream {
            proxy_pass http://$backend_host:8000;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            add_header X-Accel-Buffering no;
        }

        # Metrics（只允許內部存取）
        location /metrics {
            allow 172.16.0.0/12;  # Docker 內部網路
            deny all;
            proxy_pass http://$backend_host:8000;
        }

        # 前端（開發期直接指向 Vite dev server）
        location / {
            proxy_pass http://host.docker.internal:3000;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
