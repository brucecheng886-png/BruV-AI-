events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;

    server {
        listen 80;
        server_name localhost;

        # Docker 內建 DNS resolver + 變數型 proxy_pass
        # 每次請求按 TTL 重新解析容器 IP，容器重啟後最多 10 秒自動恢復
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_host backend;

        client_max_body_size 100M;

        # API proxy
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://$backend_host:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Upload (higher size, longer timeout)
        location /api/documents/upload {
            limit_req zone=upload burst=3 nodelay;
            proxy_pass http://$backend_host:8000;
            proxy_set_header Host $host;
            proxy_read_timeout 300s;
        }

        # SSE streaming (no buffering)
        location /api/chat/stream {
            proxy_pass http://$backend_host:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            add_header X-Accel-Buffering no;
        }

        location /api/agent/run {
            proxy_pass http://$backend_host:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            add_header X-Accel-Buffering no;
        }

        # Metrics (internal only)
        location /metrics {
            allow 172.16.0.0/12;
            deny all;
            proxy_pass http://$backend_host:8000;
        }

        # Vue SPA static files
        location / {
            root /usr/share/nginx/html;
            try_files $uri /index.html;
            # index.html 永不快取，JS/CSS 資源允許長期快取（hash 變了就換 URL）
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Hashed assets can be cached forever
        location ~* ^/assets/.+\.(js|css)$ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }
    }
}
