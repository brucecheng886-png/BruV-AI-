<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f8ef7"/>
      <stop offset="100%" stop-color="#9b5cf6"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f8ef7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#9b5cf6" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <!-- 背景圓 -->
  <circle cx="24" cy="24" r="23" fill="url(#grad2)" stroke="url(#grad)" stroke-width="1.5"/>

  <!-- 書本底座 -->
  <rect x="10" y="28" width="28" height="4" rx="2" fill="url(#grad)" opacity="0.7"/>
  <rect x="13" y="25" width="22" height="5" rx="1.5" fill="url(#grad)" opacity="0.45"/>

  <!-- 神經網路節點 -->
  <!-- 中心節點 -->
  <circle cx="24" cy="16" r="3.5" fill="url(#grad)"/>
  <!-- 左節點 -->
  <circle cx="13" cy="22" r="2.5" fill="url(#grad)" opacity="0.85"/>
  <!-- 右節點 -->
  <circle cx="35" cy="22" r="2.5" fill="url(#grad)" opacity="0.85"/>
  <!-- 左上節點 -->
  <circle cx="16" cy="11" r="2" fill="url(#grad)" opacity="0.7"/>
  <!-- 右上節點 -->
  <circle cx="32" cy="11" r="2" fill="url(#grad)" opacity="0.7"/>

  <!-- 連線 -->
  <line x1="24" y1="16" x2="13" y2="22" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="24" y1="16" x2="35" y2="22" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="24" y1="16" x2="16" y2="11" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="24" y1="16" x2="32" y2="11" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="16" y1="11" x2="13" y2="22" stroke="url(#grad)" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <line x1="32" y1="11" x2="35" y2="22" stroke="url(#grad)" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
</svg>
