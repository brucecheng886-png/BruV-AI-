services:

  # ── 反向代理 ────────────────────────────────────────────────
  nginx:
    image: ghcr.io/brucecheng886-png/bruv-ai-nginx:latest
    container_name: bruv_ai_nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - bruv_ai_network
    restart: unless-stopped

  # ── 資料庫層 ────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: bruv_ai_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - bruv_ai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: bruv_ai_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      - bruv_ai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/status | grep -q Tgid || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  neo4j:
    image: neo4j:5-community
    container_name: bruv_ai_neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - bruv_ai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 300s

  redis:
    image: redis:7-alpine
    container_name: bruv_ai_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - bruv_ai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: bruv_ai_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - bruv_ai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── LLM 推理 ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: bruv_ai_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - bruv_ai_network
    restart: unless-stopped
    environment:
      - OLLAMA_NUM_GPU=${OLLAMA_NUM_GPU:-0}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 15s
      retries: 5

  # ── 應用程式層 ───────────────────────────────────────────────
  backend:
    image: ghcr.io/brucecheng886-png/bruv-ai-backend:latest
    container_name: bruv_ai_backend
    env_file: .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./data/saga.db:/data/saga.db
      - ./data/uploads:/data/uploads
      - huggingface_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - bruv_ai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  celery-worker:
    image: ghcr.io/brucecheng886-png/bruv-ai-backend:latest
    container_name: bruv_ai_celery
    command: celery -A tasks worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./data/saga.db:/data/saga.db
      - ./data/uploads:/data/uploads
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - bruv_ai_network
    restart: unless-stopped

  playwright-service:
    image: ghcr.io/brucecheng886-png/bruv-ai-playwright:latest
    container_name: bruv_ai_playwright
    volumes:
      - ./data/screenshots:/data/screenshots
    networks:
      - bruv_ai_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3002/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

networks:
  bruv_ai_network:
    name: bruv_ai_network
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  minio_data:
  ollama_data:
  huggingface_cache:
